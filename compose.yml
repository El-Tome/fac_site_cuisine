# Version Traefik — nécessite la stack infra/traefik active
# Usage : docker compose up -d

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cuisine_php
    volumes:
      - ./app:/var/www/app
    environment:
      - APP_ENV=${APP_ENV}
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - web

  nginx:
    image: nginx:stable-alpine
    container_name: cuisine_nginx
    volumes:
      - ./app:/var/www/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cuisine.rule=Host(`cuisine.dev.localhost`)"
      - "traefik.http.routers.cuisine.entrypoints=websecure"
      - "traefik.http.routers.cuisine.tls=true"
      - "traefik.http.services.cuisine.loadbalancer.server.port=80"
    networks:
      - web

networks:
  web:
    external: true
