# Version simple — sans Traefik, accès direct via port
# Usage : docker compose -f compose.simple.yml up -d
# App : http://localhost:8080 | phpMyAdmin : http://localhost:8081

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cuisine_php
    volumes:
      - ./app:/var/www/app
    environment:
      - APP_ENV=${APP_ENV}
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db/${MYSQL_DATABASE}
    networks:
      - cuisine

  nginx:
    image: nginx:stable-alpine
    container_name: cuisine_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - cuisine

  db:
    image: mariadb:11.7
    container_name: cuisine_db
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cuisine

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cuisine_pma
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cuisine

networks:
  cuisine:

volumes:
  db_data:
